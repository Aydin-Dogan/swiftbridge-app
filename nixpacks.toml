[variables]
NODE_ENV = "production"

# Node 22 LTS (was 20) — vereist door vitest@4, vite, jsdom@29, eslint@10.
# Bovendien gaf nodejs_20 EBADENGINE warnings tijdens npm ci.
[phases.setup]
nixPkgs = ["nodejs_22"]

# `npm install` ipv `npm ci`, en --omit=optional om platform-specifieke
# esbuild binaries (zoals @esbuild/netbsd-arm64) over te slaan die per
# ongeluk in package-lock.json zijn beland tijdens cross-platform install.
[phases.install]
cmds = ["npm install --no-audit --no-fund --omit=optional"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server.js"
