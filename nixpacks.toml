[variables]
NODE_ENV = "production"

# Node 22 LTS (was 20) — vereist door vitest@4, vite, jsdom@29, eslint@10.
# Bovendien gaf nodejs_20 EBADENGINE warnings tijdens npm ci.
[phases.setup]
nixPkgs = ["nodejs_22"]

# `npm install` (ipv `npm ci`) zodat npm de platform-correcte optionele
# binaries pakt. GEEN --omit=optional meer: dat sloeg ook Rollup's vereiste
# @rollup/rollup-linux-x64-gnu over -> `vite build` crashte (Deploy failed).
# npm slaat niet-passende optionals (bv. @esbuild/netbsd-arm64) vanzelf over op os/cpu.
[phases.install]
cmds = ["npm install --no-audit --no-fund"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server.js"
