<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Gradient achtergrond — SwiftBridge blauw -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#fde047"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.25"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Volledige blauwe achtergrond (zorgt voor goede maskable icon op Android) -->
  <rect width="1024" height="1024" fill="url(#bg)" rx="0"/>

  <!-- Safe area (binnen 80% — geen content erbuiten voor maskable) -->
  <g transform="translate(512 512)">
    <!-- Witte achtergrondcirkel achter bliksem -->
    <circle r="280" fill="#ffffff" opacity="0.08"/>
    <circle r="220" fill="#ffffff" opacity="0.12"/>

    <!-- Bliksem ⚡ -->
    <path
      d="M -30 -240 L -160 60 L -30 60 L -90 240 L 160 -60 L 30 -60 L 90 -240 Z"
      fill="url(#bolt)"
      stroke="#fef3c7"
      stroke-width="6"
      stroke-linejoin="round"
      filter="url(#shadow)"/>

    <!-- Subtiele NL → TR markering onderaan (binnen safe area) -->
    <g transform="translate(0 340)" opacity="0.95">
      <!-- NL vlag mini -->
      <g transform="translate(-110 0)">
        <rect x="-30" y="-18" width="60" height="36" rx="6" fill="#ffffff"/>
        <rect x="-30" y="-18" width="60" height="12" rx="6" fill="#AE1C28"/>
        <rect x="-30" y="6"   width="60" height="12" fill="#21468B"/>
        <rect x="-30" y="-18" width="60" height="12" rx="6" fill="#AE1C28"/>
      </g>
      <!-- Pijl -->
      <path d="M -50 0 L 50 0 M 30 -15 L 50 0 L 30 15"
            stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- TR vlag mini -->
      <g transform="translate(110 0)">
        <rect x="-30" y="-18" width="60" height="36" rx="6" fill="#E30A17"/>
        <circle cx="-8" cy="0" r="10" fill="#ffffff"/>
        <circle cx="-4" cy="0" r="8" fill="#E30A17"/>
        <path d="M 8 0 L 18 -4 L 14 4 L 18 4 L 14 -4 Z" fill="#ffffff" transform="scale(0.6)"/>
      </g>
    </g>
  </g>
</svg>
