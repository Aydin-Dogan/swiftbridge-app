<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="letters" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.25"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Volledige blauwe achtergrond -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Witte cirkels op de achtergrond (subtiel) -->
  <circle cx="512" cy="512" r="320" fill="#ffffff" opacity="0.08"/>
  <circle cx="512" cy="512" r="260" fill="#ffffff" opacity="0.10"/>

  <!-- SB letters (groot, gecentreerd, vetgedrukt) -->
  <g filter="url(#shadow)">
    <text x="512" y="610"
          font-family="Arial Black, Arial, sans-serif"
          font-size="440"
          font-weight="900"
          text-anchor="middle"
          fill="url(#letters)"
          stroke="#fef3c7"
          stroke-width="4"
          letter-spacing="-20">SB</text>
  </g>

  <!-- Kleine NL → TR vlaggen onderaan (binnen safe area) -->
  <g transform="translate(512 870)" opacity="0.95">
    <!-- NL vlag mini -->
    <g transform="translate(-110 0)">
      <rect x="-30" y="-18" width="60" height="36" rx="6" fill="#ffffff"/>
      <rect x="-30" y="-18" width="60" height="12" rx="6" fill="#AE1C28"/>
      <rect x="-30" y="6"   width="60" height="12" fill="#21468B"/>
      <rect x="-30" y="-6"  width="60" height="12" fill="#ffffff"/>
      <rect x="-30" y="-18" width="60" height="12" rx="6" fill="#AE1C28"/>
    </g>
    <!-- Pijl -->
    <path d="M -50 0 L 50 0 M 30 -15 L 50 0 L 30 15"
          stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- TR vlag mini -->
    <g transform="translate(110 0)">
      <rect x="-30" y="-18" width="60" height="36" rx="6" fill="#E30A17"/>
      <circle cx="-8" cy="0" r="10" fill="#ffffff"/>
      <circle cx="-4" cy="0" r="8" fill="#E30A17"/>
    </g>
  </g>
</svg>
