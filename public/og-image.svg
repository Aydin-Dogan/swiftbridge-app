<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="SwiftBridge - Geld naar Turkiye in 5 minuten vanaf 0,8 procent">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle radial overlay -->
  <circle cx="950" cy="120" r="280" fill="#ffffff" opacity="0.06"/>
  <circle cx="180" cy="540" r="220" fill="#ffffff" opacity="0.05"/>

  <!-- Lightning bolt logo -->
  <g transform="translate(90, 80)" filter="url(#glow)">
    <path d="M40 0 L0 70 L25 70 L15 130 L55 60 L30 60 Z" fill="url(#accent)" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- Brand name -->
  <text x="170" y="160" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-2">
    SwiftBridge
  </text>

  <!-- Headline -->
  <text x="90" y="320" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="78" font-weight="800" fill="#ffffff" letter-spacing="-2">
    Geld naar Türkiye
  </text>
  <text x="90" y="400" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="78" font-weight="800" fill="url(#accent)" letter-spacing="-2">
    in 5 minuten
  </text>

  <!-- Slogan / route -->
  <text x="90" y="470" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#bfdbfe">
    NL → TR · vanaf 0,8% per overboeking
  </text>

  <!-- Trust badges (geen overstatement van DNB-licentie, geen fake ratings) -->
  <g transform="translate(90, 520)">
    <!-- EMI-partner badge -->
    <rect x="0" y="0" width="280" height="60" rx="30" fill="#ffffff" opacity="0.12" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="140" y="38" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">DNB-toezicht via EMI-partner</text>

    <!-- iDEAL badge -->
    <rect x="300" y="0" width="140" height="60" rx="30" fill="#ffffff" opacity="0.12" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="370" y="38" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">iDEAL</text>

    <!-- 256-bit badge -->
    <rect x="460" y="0" width="200" height="60" rx="30" fill="#ffffff" opacity="0.12" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="560" y="38" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">256-bit versleuteld</text>
  </g>

  <!-- Decorative arrow NL → TR -->
  <g transform="translate(840, 380)" opacity="0.9">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#ffffff">NL</text>
    <path d="M90 -20 L210 -20 M180 -45 L210 -20 L180 5" stroke="#fbbf24" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="220" y="0" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#fbbf24">TR</text>
  </g>
</svg>
