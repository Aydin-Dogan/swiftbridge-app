<!doctype html>
<html lang="nl">
  <head>
    <!-- ═══ Basis ═══ -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />

    <!-- ═══ Security (client-side defense-in-depth) ═══ -->
    <!-- De server stuurt de definitieve, strengere headers (Helmet + eigen middleware).
         Deze meta-tags bieden bescherming bij offline/cached loads en oude proxies. -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- F22 fix (Cursor review): script-src 'unsafe-inline' verwijderd uit meta-CSP.
         Was: regressie bij cached load via service-worker — meta-CSP zou inline scripts
         toestaan terwijl server-CSP dat niet doet. Nu beide consistent strikt. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.swiftbridge.tr https://swiftbridge-api-production.up.railway.app https://api.mollie.com; frame-ancestors 'none'; form-action 'self' https://www.mollie.com https://*.mollie.com; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" />

    <!-- ═══ SEO ═══ -->
    <title>SwiftBridge — Geld naar Türkiye in 5 minuten | Vanaf 0,8%</title>
    <meta name="description" content="Stuur geld vanuit Nederland naar Turkije en 6 Turkic landen. Vanaf 0,8% per overboeking met staffel-tarief, binnen 5 minuten op de rekening. Onder DNB-toezicht via EMI-partner." />
    <!-- F32 fix (Cursor review): "B.V." weggehaald tot KvK-inschrijving rond is.
         Wordt teruggezet zodra notaris BV-akte rondbrengt. -->
    <meta name="author" content="SwiftBridge" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://swiftbridge.tr/" />

    <!-- ═══ hreflang voor 5 talen (Verbetering F — per-locale URLs) ═══ -->
    <!-- Iedere taal heeft nu een eigen route /tr/, /en/, /nl/, /ru/, /az/.
         Google indexeert ze als aparte taal-versies in plaats van duplicate
         content op /. x-default = nl voor onbekende locales. -->
    <link rel="alternate" hreflang="nl" href="https://swiftbridge.tr/nl" />
    <link rel="alternate" hreflang="en" href="https://swiftbridge.tr/en" />
    <link rel="alternate" hreflang="tr" href="https://swiftbridge.tr/tr" />
    <link rel="alternate" hreflang="ru" href="https://swiftbridge.tr/ru" />
    <link rel="alternate" hreflang="az" href="https://swiftbridge.tr/az" />
    <link rel="alternate" hreflang="x-default" href="https://swiftbridge.tr/" />

    <!-- ═══ Open Graph (Facebook / LinkedIn / WhatsApp) ═══ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://swiftbridge.tr/" />
    <meta property="og:title" content="SwiftBridge — Geld naar Türkiye in 5 minuten" />
    <meta property="og:description" content="Vanaf 0,8% per overboeking, binnen 5 minuten op de Turkse bankrekening. Onder DNB-toezicht via EMI-partner." />
    <meta property="og:image" content="https://swiftbridge.tr/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="nl_NL" />
    <meta property="og:locale:alternate" content="tr_TR" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="ru_RU" />
    <meta property="og:locale:alternate" content="az_AZ" />
    <meta property="og:site_name" content="SwiftBridge" />

    <!-- ═══ Twitter Card ═══ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://swiftbridge.tr/" />
    <meta name="twitter:title" content="SwiftBridge — Geld naar Türkiye in 5 minuten" />
    <meta name="twitter:description" content="Vanaf 0,8% per overboeking, binnen 5 minuten op de Turkse bankrekening." />
    <meta name="twitter:image" content="https://swiftbridge.tr/og-image.png" />

    <!-- ═══ PWA — Android / Chrome ═══ -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ═══ PWA — Apple / iOS Safari ═══ -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SwiftBridge" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <meta name="apple-touch-fullscreen" content="yes" />

    <!-- ═══ Microsoft / Windows ═══ -->
    <meta name="msapplication-TileColor" content="#2563EB" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- ═══ Favicon ═══ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- ═══ Performance ═══ -->
    <link rel="preconnect" href="https://api.swiftbridge.tr" crossorigin />
    <link rel="dns-prefetch" href="https://api.swiftbridge.tr" />
    <!-- F27 fix (Cursor review): wise.com preconnect/dns-prefetch verwijderd.
         Reden: (1) elke landing-bezoeker triggerde DNS-query naar concurrent →
         traffic-volume lek naar Wise's CDN. (2) Wise wordt alleen op /status
         pagina gebruikt — daar regelt de browser DNS on-demand. (3) Privacy:
         elke bezoeker's ISP zag een wise.com lookup, ongerelateerd verkeer-
         correlatie mogelijk. -->
    <!-- Preload het hero-logo om LCP te verbeteren (kritiek above-the-fold asset) -->
    <link rel="preload" as="image" href="/icon-192.png" fetchpriority="high" />

    <!-- ═══ Structured data: FAQ (12 vragen — long-tail SEO) ═══ -->
    <script type="application/ld+json">
    {
      "@context":"https://schema.org",
      "@type":"FAQPage",
      "mainEntity":[
        {"@type":"Question","name":"Hoe snel komt geld aan in Türkiye?","acceptedAnswer":{"@type":"Answer","text":"Binnen 5 minuten via iDEAL. SwiftBridge gebruikt directe banktransfers naar Turkse banken."}},
        {"@type":"Question","name":"Wat zijn de kosten van SwiftBridge?","acceptedAnswer":{"@type":"Answer","text":"Staffel-tarief: 2,0% voor kleine bedragen (€10-200) tot 0,8% voor €2.500+. Op €500 betaal je 1,5% (€7,50). Volledige tariefkaart staat op de landing-pagina."}},
        {"@type":"Question","name":"Is SwiftBridge veilig?","acceptedAnswer":{"@type":"Answer","text":"SwiftBridge werkt onder DNB-toezicht via een EMI-partner. We volgen Wwft en AVG, gebruiken 256-bit encryptie en 2FA, en screenen alle transacties tegen EU sanctielijsten."}},
        {"@type":"Question","name":"Welke Turkse banken ondersteunen jullie?","acceptedAnswer":{"@type":"Answer","text":"Alle grote Turkse banken: Garanti BBVA, Akbank, İş Bankası, Ziraat Bankası, Yapı Kredi, Halkbank, Vakıfbank, QNB Finansbank, ING Türkiye en 100+ andere."}},
        {"@type":"Question","name":"Hoe werkt iDIN identificatie?","acceptedAnswer":{"@type":"Answer","text":"iDIN gebruikt je Nederlandse bank-app om je identiteit te verifiëren — geen scans of selfies nodig. Werkt met ING, Rabobank, ABN AMRO, SNS, ASN, Triodos, Knab, Bunq, RegioBank en meer. Duurt ~60 seconden."}},
        {"@type":"Question","name":"Wat zijn de limieten per maand of dag?","acceptedAnswer":{"@type":"Answer","text":"In de eerste 90 dagen na KYC-goedkeuring geldt een weeklimiet van €5.000. Daarna automatisch verhoogd op basis van transactie-historie. Op aanvraag tot €25.000 per transactie."}},
        {"@type":"Question","name":"Hoe verhoudt SwiftBridge zich tot Wise?","acceptedAnswer":{"@type":"Answer","text":"Wise is wereldwijd; SwiftBridge specialiseert in EUR→TRY corridor. Sneller (vaak <5 min) met betere Turkse-bank-ondersteuning. Tarief €1-2 boven Wise op €500."}},
        {"@type":"Question","name":"Kan ik een transactie annuleren?","acceptedAnswer":{"@type":"Answer","text":"Vóór betaling: ja, vervalt automatisch binnen 1 uur. Na betaling maar vóór uitbetaling: meestal niet, neem direct contact op. Na voltooiing: alleen via retour aan ontvanger."}},
        {"@type":"Question","name":"Wat als de wisselkoers wijzigt tijdens betaling?","acceptedAnswer":{"@type":"Answer","text":"De koers wordt vastgezet bij bevestiging, 15 min houdbaar. Duurt het langer, dan herberekenen we tegen actuele koers en informeren je vóór verwerking."}},
        {"@type":"Question","name":"Werkt SwiftBridge tijdens Ramazan en Bayram?","acceptedAnswer":{"@type":"Answer","text":"Ja, onze technische infrastructuur draait 24/7. Tijdens Bayram kan levering iets langer duren (tot 1 werkdag) door Turkse bank-vertragingen. Plan minimaal 2-3 dagen voor Bayram om vertraging te vermijden."}},
        {"@type":"Question","name":"Werkt SwiftBridge ook vanuit België of Duitsland?","acceptedAnswer":{"@type":"Answer","text":"Ja. Vanuit België via Bancontact, vanuit Duitsland via Sofort/SEPA. Ontvanger moet IBAN hebben in Türkiye, Azerbeidzjan, Kazachstan, Oezbekistan, Turkmenistan, Kirgizië of Tadzjikistan."}},
        {"@type":"Question","name":"Hoe kan ik contact opnemen met support?","acceptedAnswer":{"@type":"Answer","text":"Stuur een mail naar support@swiftbridge.tr. We spreken Nederlands, Turks en Engels en reageren doorgaans binnen 4 uur tijdens kantooruren."}}
      ]
    }
    </script>
